<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost Page</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=League+Spartan" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- ======= HEADER ======= -->
  <header>
    <div class="navbar">
      <div class="navbar-left">
        <p>Follow us on : </p>
        <ul class="navbar-left-list1">
          <li><a href="https://www.facebook.com/officialdmrc/"><img src="images/fb_icon.png" target="_blank" alt="FB" height="20"></a></li>
          <li><a href="https://www.instagram.com/officialdmrc/?hl=en"><img src="images/instagram_icon.png" target="_blank" alt="Insta" height="20"></a></li>
          <li><a href="https://x.com/OfficialDMRC" target="_blank"><img src="images/x_icon.png" alt="X" height="20"></a></li>
          <li><a href="https://apps.apple.com/in/app/delhi-metro-rail/id691105308" target="_blank"><img src="images/playstore_icon.png" alt="Play" height="20"></a></li>
        </ul>
      </div>
    </div>

    <!-- ======= MAIN HEADER ======= -->
    <div class="header-main">
      <div class="header-left">
        <img src="images/dmrc_logo.png" alt="DMRC Logo" />
      </div>

      <div class="header-right">
        <div class="helpline">
          <img src="images/helpline.svg" alt="Helpline" height="15">
          Helpline <br>
          <span style="color: green; font-weight: bold;">155370</span>
        </div>

        <div class="search-bar">
          <input type="text" placeholder="Search...">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <nav class="secondary-navbar">
          <ul>
            <li><a href="dashboard.html">Home</a></li>
            <li><a href="#footer">Contact</a></li>
            <li><a href="profile.html">Profile</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <!-- ======= MAIN CONTENT ======= -->
  <main class="container">
    <div class="left-column">
      <div class="main-title-left">
        <!-- Main Title -->
        <p style="font-family: 'League Spartan', sans-serif; color: #b51d1d;">Lost</p>
      </div>

      <!-- Sidebar Actions -->
      <aside class="sidebar">
        <h2>Actions</h2>
        <ul class="sidebar-links">
          <li><i class="fa-regular fa-star"></i> <a href="lost.html">Report Lost Item</a></li>
          <li><i class="fa-regular fa-star"></i> <a href="found.html">Report Found Item</a></li>
          <li><i class="fa-regular fa-star"></i> <a href="#">View Reports/ Search Item</a></li>
        </ul>
      </aside>
    </div>

    <!-- Form Container -->
    <div class="container-form">
      <section class="form-section">
        <form id="lostForm">
          <!-- Item Name -->
          <label>Item Name <span style="color: red;">*</span></label>
          <input type="text" name="itemName" required placeholder="Text" />

          <!-- Date and Time -->
          <label>Date & Time of Lost Item<span style="color: red;">*</span></label>
          <input type="datetime-local" name="lostDate" placeholder="Text" />

          <!-- Line Selection -->
          <label for="line">Choose a line <span style="color: red;">*</span></label>
          <select id="line" name="line" onchange="updateStations()">
            <option value="">Select a Line</option>
            <option value="blue">Blue Line</option>
            <option value="red">Red Line</option>
            <option value="yellow">Yellow Line</option>
            <option value="pink">Pink Line</option>
            <option value="violet">Violet Line</option>
            <option value="magenta">Magenta Line</option>
            <option value="green">Green Line</option>
            <option value="grey">Grey Line</option>
            <option value="airport">Airport Express Line</option>
            <option value="rapid">Rapid Metro Gurgaon</option>
          </select>

          <!-- Station Selection -->
          <label for="station">Choose a Station:<span style="color: red;">*</span></label>
          <select id="station" name="station">
            <option value="">Select a Station</option>
          </select>

          <!-- Remarks -->
          <label>Remarks (optional)</label>
          <textarea name="remarks" placeholder="Any extra details about the location or the item."></textarea>

          <!-- File Upload -->
          <div class="file-upload-section">
            <label>File Upload (any previous pictures)</label>
            <div class="file-upload-area">
              <i class="fa-regular fa-cloud-arrow-up"></i>
              <span>Click or drag file to this area to upload</span>
            </div>
            <div class="file-upload-info">Formats accepted are .jpg .jpeg .png</div>
            <input type="file" accept=".jpg,.jpeg,.png" style="display:none;" />
          </div>

          <!-- Buttons -->
          <div class="button-group">
            <button type="reset">Cancel</button>
            <button type="submit">Continue</button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <!-- ======= FOOTER ======= -->
  <footer>
    <div class="footer-content">
      <div class="footer-left">
        <p>© 2023 Delhi Metro Rail Corporation Ltd. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="logic.js"></script>
</body>

</html>
